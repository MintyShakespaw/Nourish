services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nourish
      POSTGRES_PASSWORD: nourish_dev
      POSTGRES_DB: nourish_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nourish -d nourish_db"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
